version: "3.9"
services:
  postgres:
    image: postgres:15
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_secret
      POSTGRES_DB: nexus_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build:
      context: ./nexus-backend
      dockerfile: Dockerfile
    container_name: nexus-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./nexus-backend:/app
    environment:
      DB_URL: "postgresql+asyncpg://nexus:nexus_secret@postgres:5432/nexus_db"
      DATABASE_URL: "postgresql+asyncpg://nexus:nexus_secret@postgres:5432/nexus_db"
      DATABASE_URL_SYNC: "postgresql://nexus:nexus_secret@postgres:5432/nexus_db"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
volumes:
  pgdata: